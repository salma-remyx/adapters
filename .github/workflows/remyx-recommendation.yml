name: Remyx Recommendation
on:
  workflow_dispatch:
jobs:
  recommend:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      pull-requests: write
      issues: write
    env:
      REMYX_API_KEY: ${{ secrets.REMYX_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: remyxai/remyx-recommendation-action@v1.1.5
        with:
          interest-id: e937f6ca-4d5c-4c0d-a802-5041cc83fb15
          rate-limit-days: 0
